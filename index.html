<script type="text/babel">

const REF_OBJECT_CM=30;

// ── IndexedDB ────────────────────────────────────────
const DB_NAME="GaitAnalysisDB";const DB_VER=1;const STORE="sessions";
function openDB(){
  return new Promise((res,rej)=>{
    const req=indexedDB.open(DB_NAME,DB_VER);
    req.onupgradeneeded=e=>{
      const db=e.target.result;
      if(!db.objectStoreNames.contains(STORE)){
        const s=db.createObjectStore(STORE,{keyPath:"id",autoIncrement:true});
        s.createIndex("timestamp","timestamp",{unique:false});
      }
    };
    req.onsuccess=e=>res(e.target.result);
    req.onerror=e=>rej(e.target.error);
  });
}
async function saveSession(data){
  const db=await openDB();
  return new Promise((res,rej)=>{
    const tx=db.transaction(STORE,"readwrite");
    tx.objectStore(STORE).add(data);
    tx.oncomplete=()=>res();
    tx.onerror=e=>rej(e.target.error);
  });
}
async function loadSessions(){
  const db=await openDB();
  return new Promise((res,rej)=>{
    const tx=db.transaction(STORE,"readonly");
    const req=tx.objectStore(STORE).getAll();
    req.onsuccess=e=>res(e.target.result.reverse());
    req.onerror=e=>rej(e.target.error);
  });
}
async function deleteSession(id){
  const db=await openDB();
  return new Promise((res,rej)=>{
    const tx=db.transaction(STORE,"readwrite");
    tx.objectStore(STORE).delete(id);
    tx.oncomplete=()=>res();
    tx.onerror=e=>rej(e.target.error);
  });
}

// ── Step 3: 動画入力（多フレーム録画対応）──────────────
const MAX_FRAMES=10; // APIへ送る代表フレーム数
const DURATION_OPTIONS=[5,10,30,60];

function RecordPanel({which,framesRef,onDone}){
  const label=which==="pre"?"訓練前":"訓練後";
  const [camActive,setCamActive]=useState(false);
  const [recDuration,setRecDuration]=useState(10);
  const [recording,setRecording]=useState(false);
  const [progress,setProgress]=useState(0);
  const [frames,setFrames]=useState([]); // サムネイル用（最大10枚）
  const [done,setDone]=useState(false);
  const vidRef=useRef();
  const canvasRef=useRef();
  const streamRef=useRef(null);
  const recIntervalRef=useRef(null);
  const progressIntervalRef=useRef(null);
  const collectedRef=useRef([]); // 録画中に集めた全フレーム

  const startCamera=async()=>{
    try{
      const s=await navigator.mediaDevices.getUserMedia({video:{facingMode:"environment",width:{ideal:1280},height:{ideal:720}}});
      streamRef.current=s;
      vidRef.current.srcObject=s;
      setCamActive(true);
    }catch{alert("カメラへのアクセスが許可されていません");}
  };

  const snapFrame=()=>{
    const v=vidRef.current;const c=canvasRef.current;
    if(!v||!c)return null;
    c.width=v.videoWidth||640;c.height=v.videoHeight||360;
    c.getContext("2d").drawImage(v,0,0);
    return c.toDataURL("image/jpeg",0.7);
  };

  const startRec=()=>{
    collectedRef.current=[];
    setProgress(0);setFrames([]);setDone(false);
    setRecording(true);
    const startTime=Date.now();
    const totalMs=recDuration*1000;
    // フレームを1秒ごとに収集
    recIntervalRef.current=setInterval(()=>{
      const f=snapFrame();
      if(f)collectedRef.current.push(f);
    },1000);
    // プログレスバーを60fpsで更新
    progressIntervalRef.current=setInterval(()=>{
      const elapsed=Date.now()-startTime;
      const pct=Math.min(elapsed/totalMs*100,100);
      setProgress(pct);
      if(elapsed>=totalMs) stopRec();
    },16);
  };

  const stopRec=()=>{
    clearInterval(recIntervalRef.current);
    clearInterval(progressIntervalRef.current);
    setRecording(false);
    setProgress(100);
    // 収集したフレームから均等に最大MAX_FRAMES枚を選ぶ
    const all=collectedRef.current;
    if(all.length===0)return;
    const selected=[];
    const step=all.length/Math.min(MAX_FRAMES,all.length);
    for(let i=0;i<Math.min(MAX_FRAMES,all.length);i++){
      selected.push(all[Math.floor(i*step)]);
    }
    framesRef.current=selected;
    setFrames(selected);
    setDone(true);
    onDone(selected);
  };

  return(
    <div style={{marginBottom:16}}>
      <div style={{fontSize:13,fontWeight:500,color:"#333",marginBottom:8,display:"flex",alignItems:"center",gap:8}}>
        <span style={{background:which==="pre"?"#f8f9fb":"#E6F1FB",color:which==="pre"?"#555":"#185FA5",padding:"2px 10px",borderRadius:20,fontSize:12,fontWeight:500}}>{label}</span>
        {done&&<span style={{fontSize:11,color:"#1D9E75"}}>✓ {frames.length}フレーム取得済み</span>}
      </div>

      {/* カメラプレビュー */}
      <div style={{position:"relative",background:"#000",borderRadius:8,overflow:"hidden",aspectRatio:"16/9",marginBottom:8}}>
        <video ref={vidRef} autoPlay muted playsInline style={{width:"100%",height:"100%",objectFit:"cover"}}/>
        {!camActive&&<div style={{position:"absolute",inset:0,display:"flex",flexDirection:"column",alignItems:"center",justifyContent:"center",gap:8,background:"rgba(0,0,0,0.7)"}}>
          <span style={{fontSize:28}}>📷</span>
          <span style={{color:"#aaa",fontSize:13}}>カメラを起動してください</span>
        </div>}
        {recording&&(
          <div style={{position:"absolute",top:8,right:8,background:"rgba(226,75,74,0.9)",borderRadius:20,padding:"3px 10px",fontSize:11,color:"#fff",display:"flex",alignItems:"center",gap:4}}>
            <span style={{width:6,height:6,borderRadius:"50%",background:"#fff",display:"inline-block",animation:"pulse 1s infinite"}}/>
            REC
          </div>
        )}
        {done&&frames.length>0&&(
          <div style={{position:"absolute",bottom:8,left:8,right:8,background:"rgba(0,0,0,0.6)",borderRadius:6,padding:"4px 8px",fontSize:11,color:"#fff"}}>
            {frames.length}フレームを取得しました（川の流れを{frames.length}枚の葉で代表）
          </div>
        )}
      </div>
      <canvas ref={canvasRef} style={{display:"none"}}/>

      {/* プログレスバー */}
      {(recording||progress>0)&&(
        <div style={{background:"#eee",borderRadius:4,height:6,marginBottom:8,overflow:"hidden"}}>
          <div style={{height:6,borderRadius:4,background:recording?"#E24B4A":"#1D9E75",width:`${progress}%`,transition:"width 0.05s linear"}}/>
        </div>
      )}

      {/* コントロール */}
      <div style={{display:"flex",gap:8,alignItems:"center",marginBottom:8,flexWrap:"wrap"}}>
        {!camActive&&<Btn onClick={startCamera}>📷 カメラ起動</Btn>}
        {camActive&&!recording&&(
          <>
            <div style={{display:"flex",alignItems:"center",gap:6,fontSize:13}}>
              <span style={{color:"#666"}}>録画時間:</span>
              {DURATION_OPTIONS.map(d=>(
                <button key={d} onClick={()=>setRecDuration(d)} style={{padding:"4px 10px",fontSize:12,background:recDuration===d?"#185FA5":"#fff",color:recDuration===d?"#fff":"#555",border:recDuration===d?"none":"0.5px solid #ccc",borderRadius:6,cursor:"pointer"}}>
                  {d}秒
                </button>
              ))}
            </div>
            <Btn onClick={startRec} primary>⏺ 録画開始</Btn>
          </>
        )}
        {recording&&<Btn onClick={stopRec}>⏹ 録画停止</Btn>}
      </div>

      {/* フレームサムネイル */}
      {frames.length>0&&(
        <div>
          <div style={{fontSize:11,color:"#888",marginBottom:4}}>取得フレーム（川面の{frames.length}枚の切り取り）</div>
          <div style={{display:"flex",gap:4,overflowX:"auto",paddingBottom:4}}>
            {frames.map((f,i)=>(
              <div key={i} style={{flexShrink:0,position:"relative"}}>
                <img src={f} style={{width:72,height:48,objectFit:"cover",borderRadius:4,border:"0.5px solid #ddd"}} alt={`frame${i}`}/>
                <div style={{position:"absolute",bottom:2,left:2,background:"rgba(0,0,0,0.6)",color:"#fff",fontSize:8,padding:"1px 3px",borderRadius:2}}>{i+1}</div>
              </div>
            ))}
          </div>
        </div>
      )}
    </div>
  );
}

function Step3Video({onBack,onNext,angleRef,preFramesRef,postFramesRef}){
  const [inputMode,setInputMode]=useState("upload");
  const [preURL,setPreURL]=useState(null);
  const [postURL,setPostURL]=useState(null);
  const preVid=useRef();const postVid=useRef();
  const preFramesTmp=useRef([]);
  const postFramesTmp=useRef([]);

  // アップロード動画から均等フレームを抽出
  const extractFrames=(el,which)=>{
    el.addEventListener("loadedmetadata",()=>{
      const dur=el.duration;
      const count=Math.min(MAX_FRAMES,Math.floor(dur));
      const times=Array.from({length:count},(_,i)=>i*(dur/count));
      const collected=[];
      let idx=0;
      const seekNext=()=>{
        if(idx>=times.length){
          const ref=which==="pre"?preFramesRef:postFramesRef;
          ref.current=collected;
          return;
        }
        el.currentTime=times[idx];
      };
      el.addEventListener("seeked",()=>{
        const c=document.createElement("canvas");
        c.width=el.videoWidth||640;c.height=el.videoHeight||360;
        c.getContext("2d").drawImage(el,0,0);
        collected.push(c.toDataURL("image/jpeg",0.7));
        idx++;seekNext();
      });
      seekNext();
    },{once:true});
  };

  const handleUpload=(e,which)=>{
    const f=e.target.files[0];if(!f)return;
    const url=URL.createObjectURL(f);
    if(which==="pre")setPreURL(url);else setPostURL(url);
  };
  useEffect(()=>{if(preURL&&preVid.current)extractFrames(preVid.current,"pre");},[preURL]);
  useEffect(()=>{if(postURL&&postVid.current)extractFrames(postVid.current,"post");},[postURL]);

  const UpZone=({label,url,vidRef,which})=>(
    <div style={{flex:1}}>
      <div style={{fontSize:12,color:"#888",marginBottom:6,fontWeight:500}}>{label}</div>
      {!url?(
        <label style={{display:"flex",flexDirection:"column",alignItems:"center",justifyContent:"center",gap:8,border:"1.5px dashed #ccc",borderRadius:12,padding:"1.5rem 0.5rem",cursor:"pointer",fontSize:13,color:"#aaa",minHeight:120}}>
          <span style={{fontSize:28}}>🎬</span>
          <span style={{textAlign:"center"}}>{label}の動画を<br/>タップして選択</span>
          <input type="file" accept="video/*" onChange={e=>handleUpload(e,which)} style={{display:"none"}}/>
        </label>
      ):(
        <video ref={vidRef} src={url} controls style={{width:"100%",borderRadius:8,maxHeight:140}}/>
      )}
    </div>
  );

  return(
    <div>
      <Card>
        <CardTitle icon="🎥">動画入力モード</CardTitle>
        <ModeTabs options={[["upload","動画アップロード"],["camera","リアルタイム録画"]]} value={inputMode} onChange={setInputMode}/>
        {inputMode==="upload"?(
          <div>
            <div style={{fontSize:12,color:"#888",marginBottom:8}}>動画から均等に最大{MAX_FRAMES}フレームを自動抽出します</div>
            <div style={{display:"flex",gap:12}}>
              <UpZone label="訓練前" url={preURL} vidRef={preVid} which="pre"/>
              <UpZone label="訓練後" url={postURL} vidRef={postVid} which="post"/>
            </div>
          </div>
        ):(
          <div>
            <div style={{fontSize:12,color:"#888",marginBottom:12,background:"#f8f9fb",padding:"8px 10px",borderRadius:8,lineHeight:1.6}}>
              録画時間を選んで「録画開始」→ 自動で{MAX_FRAMES}フレームを収集 → 訓練前・後それぞれ録画してください
            </div>
            <RecordPanel which="pre" framesRef={preFramesTmp} onDone={fs=>preFramesRef.current=fs}/>
            <div style={{height:1,background:"#eee",margin:"12px 0"}}/>
            <RecordPanel which="post" framesRef={postFramesTmp} onDone={fs=>postFramesRef.current=fs}/>
          </div>
        )}
      </Card>
      <Card>
        <CardTitle icon="📐">撮影アングル確認</CardTitle>
        <select ref={angleRef} style={{...inp,width:"100%"}} defaultValue="sagittal">
          <option value="sagittal">側面（矢状面）</option>
          <option value="frontal">正面</option>
        </select>
      </Card>
      <NavRow>
        <Btn onClick={onBack}>← カメラ設定へ</Btn>
        <Btn onClick={onNext} primary>AI解析を開始する →</Btn>
      </NavRow>
    </div>
  );
}

// ── Step 4: AI解析 ──────────────────────────────────
function Step4Analysis({onBack,onNext,patient,angleRef,preFramesRef,postFramesRef,resultRef}){
  const [status,setStatus]=useState("running");
  const [result,setResult]=useState(null);
  const [errMsg,setErrMsg]=useState("");

  useEffect(()=>{run();},[]);

  const run=async()=>{
    setStatus("running");
    if(!window.getKey()){setErrMsg("APIキーが未入力です。上部バナーに入力して「保存」を押してください。");setStatus("error");return;}
    const angle=angleRef.current?.value||"sagittal";
    const preFrames=preFramesRef.current||[];
    const postFrames=postFramesRef.current||[];
    const hasImg=preFrames.length>0&&postFrames.length>0;

    const profile=`患者情報:
- ID: ${patient.id||"不明"} / ${patient.name||"匿名"} / ${patient.age||"?"}歳 / ${patient.sex||"不明"}
- 主診断: ${patient.mainDx||"不明"}
- 発症: ${patient.onset||"不明"}
- 現症: ${patient.mainSx||"なし"}
- 歩行補助具: ${patient.aid||"なし"}
- 歩行自立度: ${patient.independence||"不明"}
- 既往: ${patient.pmh||"なし"}
- 併存: ${patient.comorbid||"なし"}
- 内服薬: ${patient.meds||"なし"}
- 禁忌: ${patient.contraindications||"なし"}
- FIM運動: ${patient.fim_motor||"未記入"} / FIM認知: ${patient.fim_cog||"未記入"} / BI: ${patient.bi||"未記入"}
- 10m歩行: 訓練前 ${patient.walk10_pre||"未記入"}秒 → 訓練後 ${patient.walk10_post||"未記入"}秒`;

    const prompt=`あなたは理学療法士向けの歩行解析AIです。以下の患者情報と撮影条件を踏まえて歩行を解析してください。

${profile}
撮影角度: ${angle==="sagittal"?"側面（矢状面）":"正面"}
${hasImg?`訓練前${preFrames.length}フレーム・訓練後${postFrames.length}フレームの動画切り出し画像（1秒間隔）が提供されています。時系列の変化（歩行周期の複数局面）を読み取って解析してください。各フレームには床面に30cmの基準オブジェクトが置かれています。この基準物のピクセル幅を読み取り、スケール係数（cm/pixel）を算出した上で、フレーム間の人物移動距離から歩行速度（m/s）とケーデンス（歩/分）を推定してください。`:"デモとして典型的な片麻痺歩行パターンを解析してください（速度・ケーデンスはデモ値で構いません）。"}

患者の疾患・内服薬・禁忌事項・ADL状況を考慮した上で解析し、以下のJSONのみを返してください（コードブロック不要）:
{
  "angles":{"hip_pre":数値,"hip_post":数値,"knee_pre":数値,"knee_post":数値,"ankle_pre":数値,"ankle_post":数値},
  "pattern":{"label":"歩行パターン名","pre":"訓練前の特徴","post":"訓練後の変化"},
  "cog":{"score_pre":数値,"score_post":数値,"description":"重心評価の説明"},
  "flags":["病的所見1","病的所見2"],
  "gait_metrics":{"speed_pre":数値,"speed_post":数値,"cadence_pre":数値,"cadence_post":数値,"scale_px_per_cm":数値,"note":"スケール補正の信頼性や推定根拠を一言で"},
  "immediate_effect":{"summary":"即時効果の総合評価（2〜3文）","positive":["改善点1","改善点2"],"attention":["注意点1","注意点2"]},
  "rehab":{"problems":["問題点1","問題点2","問題点3"],"program":["推奨プログラム1","推奨プログラム2","推奨プログラム3"],"precautions":"患者固有の禁忌・注意事項を踏まえたリハビリ実施上の注意"}
}`;

    try{
      const content=hasImg
        ?[
            {type:"text",text:"【訓練前フレーム群】"},
            ...preFrames.map(f=>({type:"image",source:{type:"base64",media_type:"image/jpeg",data:f.split(",")[1]}})),
            {type:"text",text:"【訓練後フレーム群】"},
            ...postFrames.map(f=>({type:"image",source:{type:"base64",media_type:"image/jpeg",data:f.split(",")[1]}})),
            {type:"text",text:prompt},
          ]
        :prompt;
      const res=await fetch("https://api.anthropic.com/v1/messages",{
        method:"POST",
        headers:{"Content-Type":"application/json","x-api-key":window.getKey(),"anthropic-version":"2023-06-01","anthropic-dangerous-direct-browser-access":"true"},
        body:JSON.stringify({model:"claude-sonnet-4-6",max_tokens:1500,messages:[{role:"user",content}]}),
      });
      const data=await res.json();
      if(data.error)throw new Error(data.error.message);
      const text=data.content.map(i=>i.text||"").join("");
      const clean=text.replace(/```json|```/g,"").trim();
      const parsed=JSON.parse(clean);
      resultRef.current=parsed;
      setResult(parsed);
      setStatus("done");
      // IndexedDBに保存（フレームはBlob化して軽量に）
      try{
        await saveSession({
          timestamp: new Date().toISOString(),
          patient: patient,
          frames_pre: preFrames.slice(0,3), // サムネイル用に先頭3枚のみ
          frames_post: postFrames.slice(0,3),
          result: parsed,
        });
      }catch(e){console.warn("IndexedDB保存エラー:",e);}
    }catch(e){
      console.error(e);
      setErrMsg(e.message||"不明なエラーです。コンソール（F12）を確認してください。");
      setStatus("error");
    }
  };

  const Bar=({pre,post,max=60})=>{
    const preW=Math.min(Math.abs(pre)/max*100,100);
    const postW=Math.min(Math.abs(post)/max*100,100);
    const diff=post-pre;
    return(
      <div style={{marginBottom:4}}>
        <div style={{display:"flex",alignItems:"center",gap:8,marginBottom:3}}>
          <span style={{fontSize:11,color:"#aaa",minWidth:32,textAlign:"right"}}>前</span>
          <div style={{flex:1,background:"#eee",borderRadius:4,height:8}}>
            <div style={{width:`${preW}%`,height:8,borderRadius:4,background:"#B4B2A9",transition:"width 0.5s"}}/>
          </div>
          <span style={{fontSize:12,minWidth:36,textAlign:"right",color:"#555"}}>{pre}°</span>
        </div>
        <div style={{display:"flex",alignItems:"center",gap:8}}>
          <span style={{fontSize:11,color:"#185FA5",minWidth:32,textAlign:"right"}}>後</span>
          <div style={{flex:1,background:"#eee",borderRadius:4,height:8}}>
            <div style={{width:`${postW}%`,height:8,borderRadius:4,background:"#185FA5",transition:"width 0.5s"}}/>
          </div>
          <span style={{fontSize:12,minWidth:36,textAlign:"right",fontWeight:500,color:"#185FA5"}}>{post}°</span>
          <span style={{fontSize:11,minWidth:32,color:diff>0?"#1D9E75":"#E24B4A",fontWeight:500}}>{diff>0?"+":""}{diff}°</span>
        </div>
      </div>
    );
  };

  const ScoreGauge=({label,score})=>(
    <div style={{flex:1,background:"#f8f9fb",borderRadius:8,padding:"10px 12px"}}>
      <div style={{fontSize:11,color:"#aaa",marginBottom:6}}>{label}</div>
      <div style={{display:"flex",alignItems:"baseline",gap:4,marginBottom:6}}>
        <span style={{fontSize:24,fontWeight:500}}>{score}</span>
        <span style={{fontSize:12,color:"#aaa"}}>/100</span>
      </div>
      <div style={{background:"#eee",borderRadius:4,height:6}}>
        <div style={{width:`${score}%`,height:6,borderRadius:4,background:score>75?"#1D9E75":score>50?"#BA7517":"#E24B4A",transition:"width 0.6s"}}/>
      </div>
    </div>
  );

  return(
    <div>
      {status==="running"&&(
        <Card>
          <div style={{display:"flex",alignItems:"center",gap:10,fontSize:13,color:"#666"}}>
            <span className="dot"/><span className="dot"/><span className="dot"/>
            患者情報を踏まえて解析中です...
          </div>
        </Card>
      )}
      {status==="error"&&(
        <Card>
          <p style={{color:"#A32D2D",fontSize:14,fontWeight:500,marginBottom:6}}>⚠ 解析に失敗しました</p>
          <p style={{color:"#666",fontSize:13,marginBottom:12,background:"#FCEBEB",padding:"8px 10px",borderRadius:8,lineHeight:1.6}}>{errMsg}</p>
          <NavRow><Btn onClick={run} primary>再試行</Btn></NavRow>
        </Card>
      )}
      {status==="done"&&result&&(<>
        {result.gait_metrics&&(
        <Card>
          <CardTitle icon="⚡">歩行速度・ケーデンス（推定値）</CardTitle>
          <div style={{display:"grid",gridTemplateColumns:"repeat(2,1fr)",gap:8,marginBottom:10}}>
            {[
              ["歩行速度",result.gait_metrics.speed_pre,result.gait_metrics.speed_post,"m/s"],
              ["ケーデンス",result.gait_metrics.cadence_pre,result.gait_metrics.cadence_post,"歩/分"],
            ].map(([name,pre,post,unit])=>{
              const diff=(post-pre).toFixed(2);
              return(
                <div key={name} style={{background:"#f8f9fb",borderRadius:8,padding:"10px 12px"}}>
                  <div style={{fontSize:11,color:"#aaa",marginBottom:4}}>{name}</div>
                  <div style={{display:"flex",alignItems:"baseline",gap:4,marginBottom:4}}>
                    <span style={{fontSize:13,color:"#999"}}>{pre}→</span>
                    <span style={{fontSize:22,fontWeight:500}}>{post}</span>
                    <span style={{fontSize:11,color:"#aaa"}}>{unit}</span>
                  </div>
                  <div style={{fontSize:11,fontWeight:500,color:diff>0?"#1D9E75":"#E24B4A"}}>
                    {diff>0?"+":""}{diff} {unit}
                  </div>
                </div>
              );
            })}
          </div>
          <div style={{fontSize:11,color:"#aaa",background:"#f8f9fb",padding:"6px 10px",borderRadius:6}}>
            📏 スケール補正: {result.gait_metrics.scale_px_per_cm?.toFixed(2)||"–"} px/cm　|　{result.gait_metrics.note||""}
          </div>
        </Card>
        )}
        <Card>
          <CardTitle icon="📊">関節角度の変化（訓練前後）</CardTitle>
          {[["股関節",result.angles.hip_pre,result.angles.hip_post],["膝関節",result.angles.knee_pre,result.angles.knee_post],["足関節",result.angles.ankle_pre,result.angles.ankle_post]].map(([name,pre,post])=>(
            <div key={name} style={{marginBottom:12}}>
              <div style={{fontSize:13,fontWeight:500,color:"#333",marginBottom:4}}>{name}</div>
              <Bar pre={pre} post={post}/>
            </div>
          ))}
        </Card>

        <Card>
          <CardTitle icon="🎯">重心評価スコア（訓練前後）</CardTitle>
          <div style={{display:"flex",gap:8,marginBottom:10}}>
            <ScoreGauge label="訓練前" score={result.cog.score_pre}/>
            <ScoreGauge label="訓練後" score={result.cog.score_post}/>
          </div>
          <p style={{fontSize:13,color:"#666",lineHeight:1.7}}>{result.cog.description}</p>
        </Card>

        <Card>
          <CardTitle icon="🚶">歩行パターン評価</CardTitle>
          <span style={{background:"#FAEEDA",color:"#854F0B",fontSize:11,padding:"2px 8px",borderRadius:20,fontWeight:500}}>{result.pattern.label}</span>
          <div style={{marginTop:10,display:"grid",gridTemplateColumns:"1fr 1fr",gap:8}}>
            <div style={{background:"#f8f9fb",borderRadius:8,padding:"10px 12px"}}>
              <div style={{fontSize:11,color:"#aaa",marginBottom:4}}>訓練前</div>
              <p style={{fontSize:13,color:"#555",lineHeight:1.6}}>{result.pattern.pre}</p>
            </div>
            <div style={{background:"#E6F1FB",borderRadius:8,padding:"10px 12px"}}>
              <div style={{fontSize:11,color:"#185FA5",marginBottom:4}}>訓練後</div>
              <p style={{fontSize:13,color:"#185FA5",lineHeight:1.6}}>{result.pattern.post}</p>
            </div>
          </div>
        </Card>

        <Card>
          <CardTitle icon="⚡">即時効果の評価</CardTitle>
          <div style={{background:"#f8f9fb",borderRadius:8,padding:"12px",marginBottom:10}}>
            <p style={{fontSize:13,color:"#444",lineHeight:1.7}}>{result.immediate_effect.summary}</p>
          </div>
          <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:8}}>
            <div>
              <div style={{fontSize:12,color:"#1D9E75",fontWeight:500,marginBottom:6}}>✓ 改善点</div>
              {result.immediate_effect.positive.map((p,i)=><div key={i} style={{fontSize:12,color:"#444",padding:"4px 0",borderBottom:"0.5px solid #eee",lineHeight:1.5}}>・{p}</div>)}
            </div>
            <div>
              <div style={{fontSize:12,color:"#E24B4A",fontWeight:500,marginBottom:6}}>⚠ 注意点</div>
              {result.immediate_effect.attention.map((a,i)=><div key={i} style={{fontSize:12,color:"#444",padding:"4px 0",borderBottom:"0.5px solid #eee",lineHeight:1.5}}>・{a}</div>)}
            </div>
          </div>
        </Card>

        <Card>
          <CardTitle icon="⚠️">病的所見フラグ</CardTitle>
          <div style={{display:"flex",flexWrap:"wrap",gap:4}}>
            {result.flags.map(f=><span key={f} style={{background:"#FCEBEB",color:"#A32D2D",fontSize:11,padding:"3px 8px",borderRadius:4,fontWeight:500}}>⚠ {f}</span>)}
          </div>
        </Card>

        <Card>
          <CardTitle icon="📋">問題点と推奨リハビリ</CardTitle>
          <div style={{marginBottom:12}}>
            <div style={{fontSize:12,color:"#666",fontWeight:500,marginBottom:6}}>主要問題点</div>
            {result.rehab.problems.map((p,i)=><div key={i} style={{fontSize:13,color:"#333",padding:"5px 0",borderBottom:"0.5px solid #eee"}}>　{i+1}. {p}</div>)}
          </div>
          <div style={{marginBottom:12}}>
            <div style={{fontSize:12,color:"#666",fontWeight:500,marginBottom:6}}>推奨プログラム</div>
            {result.rehab.program.map((p,i)=><div key={i} style={{fontSize:13,color:"#333",padding:"5px 0",borderBottom:"0.5px solid #eee"}}>　・{p}</div>)}
          </div>
          <div style={{background:"#FAEEDA",borderRadius:8,padding:"10px 12px"}}>
            <div style={{fontSize:12,color:"#854F0B",fontWeight:500,marginBottom:4}}>⚠ 実施上の注意（患者固有）</div>
            <p style={{fontSize:13,color:"#633806",lineHeight:1.6}}>{result.rehab.precautions}</p>
          </div>
        </Card>

        <NavRow>
          <Btn onClick={onBack}>← 動画を変更</Btn>
          <Btn onClick={onNext} primary>レポートへ →</Btn>
        </NavRow>
      </>)}
    </div>
  );
}

// ── Step 5: レポート ──────────────────────────────────
function Step5Report({onBack,onHistory,patient,resultRef}){
  const [note,setNote]=useState("");
  const r=resultRef.current;

  const reportText=r?`歩行解析レポート
作成日: ${patient.date||new Date().toLocaleDateString("ja-JP")}
担当PT: ${patient.pt||"未入力"}

【患者情報】
ID: ${patient.id||"未入力"} / ${patient.name||"匿名"} / ${patient.age||"?"}歳 / ${patient.sex||"不明"}
主診断: ${patient.mainDx||"未入力"}
発症: ${patient.onset||"未入力"}
現症: ${patient.mainSx||"未入力"}
歩行補助具: ${patient.aid||"なし"} / 歩行自立度: ${patient.independence||"未入力"}
既往: ${patient.pmh||"なし"}
併存: ${patient.comorbid||"なし"}
内服薬: ${patient.meds||"なし"}
禁忌: ${patient.contraindications||"なし"}
FIM運動: ${patient.fim_motor||"未記入"}点 / FIM認知: ${patient.fim_cog||"未記入"}点 / BI: ${patient.bi||"未記入"}点
10m歩行: 訓練前 ${patient.walk10_pre||"未記入"}秒 → 訓練後 ${patient.walk10_post||"未記入"}秒

${r.gait_metrics?`【歩行速度・ケーデンス（推定値）】
  歩行速度: ${r.gait_metrics.speed_pre} → ${r.gait_metrics.speed_post} m/s
  ケーデンス: ${r.gait_metrics.cadence_pre} → ${r.gait_metrics.cadence_post} 歩/分
  スケール補正: ${r.gait_metrics.note||""}

`:""}【関節角度（訓練前→後）】
  股関節: ${r.angles.hip_pre}° → ${r.angles.hip_post}°（${r.angles.hip_post-r.angles.hip_pre>0?"+":""}${r.angles.hip_post-r.angles.hip_pre}°）
  膝関節: ${r.angles.knee_pre}° → ${r.angles.knee_post}°（${r.angles.knee_post-r.angles.knee_pre>0?"+":""}${r.angles.knee_post-r.angles.knee_pre}°）
  足関節: ${r.angles.ankle_pre}° → ${r.angles.ankle_post}°（${r.angles.ankle_post-r.angles.ankle_pre>0?"+":""}${r.angles.ankle_post-r.angles.ankle_pre}°）

【歩行パターン】${r.pattern.label}
  訓練前: ${r.pattern.pre}
  訓練後: ${r.pattern.post}

【重心評価】訓練前 ${r.cog.score_pre}/100 → 訓練後 ${r.cog.score_post}/100
  ${r.cog.description}

【即時効果】${r.immediate_effect.summary}
  改善点: ${r.immediate_effect.positive.join(" / ")}
  注意点: ${r.immediate_effect.attention.join(" / ")}

【病的所見フラグ】${r.flags.join(" / ")}

【問題点】${r.rehab.problems.map((p,i)=>`\n  ${i+1}. ${p}`).join("")}

【推奨リハビリ】${r.rehab.program.map(p=>`\n  ・${p}`).join("")}

【実施上の注意】${r.rehab.precautions}

【セラピストメモ】${note||"（なし）"}`
  :"解析結果がありません。Step 4 に戻って解析を実行してください。";

  const downloadTxt=()=>{
    const blob=new Blob([reportText],{type:"text/plain;charset=utf-8"});
    const a=document.createElement("a");
    a.href=URL.createObjectURL(blob);
    a.download=`gait_report_${patient.id||"pt"}_${patient.date||"nodate"}.txt`;
    a.click();
  };

  const downloadPDF=()=>{
    if(!r)return;
    const {jsPDF}=window.jspdf;
    const doc=new jsPDF({orientation:"portrait",unit:"mm",format:"a4"});
    const lines=reportText.split("\n");
    let y=15;
    doc.setFont("helvetica");
    lines.forEach(line=>{
      if(y>270){doc.addPage();y=15;}
      if(line.startsWith("【")){
        doc.setFontSize(11);doc.setFont("helvetica","bold");
        doc.text(line,14,y);y+=6;
      } else if(line.startsWith("歩行解析レポート")){
        doc.setFontSize(16);doc.setFont("helvetica","bold");
        doc.text(line,14,y);y+=8;
      } else {
        doc.setFontSize(9);doc.setFont("helvetica","normal");
        const wrapped=doc.splitTextToSize(line||" ",180);
        doc.text(wrapped,14,y);y+=wrapped.length*4.5;
      }
    });
    doc.save(`gait_report_${patient.id||"pt"}_${patient.date||"nodate"}.pdf`);
  };

  return(
    <div>
      <Card>
        <CardTitle icon="📄">解析レポートプレビュー</CardTitle>
        <pre style={{fontSize:11,color:"#555",lineHeight:1.8,whiteSpace:"pre-wrap",background:"#f8f9fb",padding:"1rem",borderRadius:8,fontFamily:"monospace",overflowX:"auto",maxHeight:400,overflowY:"auto"}}>
          {reportText}
        </pre>
      </Card>
      <Card>
        <CardTitle icon="✏️">セラピストメモ</CardTitle>
        <textarea value={note} onChange={e=>setNote(e.target.value)} rows={4} placeholder="追記・修正事項をここに入力..." style={{width:"100%",border:"0.5px solid #ddd",borderRadius:8,padding:10,fontSize:13,resize:"vertical",fontFamily:"inherit"}}/>
      </Card>
      <NavRow>
        <Btn onClick={onBack}>← 解析結果へ</Btn>
        <Btn onClick={downloadTxt}>TXT ↓</Btn>
        <Btn onClick={downloadPDF}>PDF ↓</Btn>
        <Btn onClick={onHistory} primary>📖 航海日誌</Btn>
      </NavRow>
    </div>
  );
}

// ── Step 6: 航海日誌（過去セッション一覧）──────────────
function Step6History({onBack}){
  const [sessions,setSessions]=useState([]);
  const [loading,setLoading]=useState(true);
  const [selected,setSelected]=useState(null);
  const [deleting,setDeleting]=useState(null);

  useEffect(()=>{
    loadSessions().then(s=>{setSessions(s);setLoading(false);}).catch(()=>setLoading(false));
  },[]);

  const handleDelete=async(id,e)=>{
    e.stopPropagation();
    if(!window.confirm("このセッションを削除しますか？"))return;
    setDeleting(id);
    await deleteSession(id);
    setSessions(prev=>prev.filter(s=>s.id!==id));
    if(selected?.id===id)setSelected(null);
    setDeleting(null);
  };

  const scoreColor=s=>s>75?"#1D9E75":s>50?"#BA7517":"#E24B4A";

  if(loading)return<Card><div style={{display:"flex",alignItems:"center",gap:10,fontSize:13,color:"#666"}}><span className="dot"/><span className="dot"/><span className="dot"/>航海日誌を読み込み中...</div></Card>;

  return(
    <div>
      <Card>
        <CardTitle icon="📖">航海日誌（過去セッション）</CardTitle>
        {sessions.length===0?(
          <div style={{textAlign:"center",padding:"2rem",color:"#aaa",fontSize:13}}>
            <div style={{fontSize:32,marginBottom:8}}>🗂</div>
            まだ航海の記録がありません。<br/>解析を完了するとここに積み重なります。
          </div>
        ):(
          <div>
            <div style={{fontSize:12,color:"#888",marginBottom:8}}>{sessions.length}件のセッションが保存されています</div>
            {sessions.map(s=>(
              <div key={s.id} onClick={()=>setSelected(selected?.id===s.id?null:s)}
                style={{border:`1px solid ${selected?.id===s.id?"#185FA5":"#eee"}`,borderRadius:10,padding:"10px 12px",marginBottom:8,cursor:"pointer",background:selected?.id===s.id?"#E6F1FB":"#fff",transition:"all 0.15s"}}>
                <div style={{display:"flex",justifyContent:"space-between",alignItems:"flex-start",gap:8}}>
                  <div style={{flex:1}}>
                    <div style={{display:"flex",alignItems:"center",gap:6,marginBottom:4}}>
                      <span style={{fontSize:13,fontWeight:500,color:"#333"}}>{s.patient?.name||"匿名"}</span>
                      <span style={{fontSize:11,color:"#888"}}>{s.patient?.id||""}</span>
                      <span style={{fontSize:10,background:"#f0f4f8",color:"#555",padding:"1px 6px",borderRadius:10}}>{s.patient?.age||"?"}歳 {s.patient?.sex||""}</span>
                    </div>
                    <div style={{fontSize:12,color:"#666",marginBottom:4}}>{s.patient?.mainDx||"診断名未入力"}</div>
                    <div style={{fontSize:11,color:"#aaa"}}>{new Date(s.timestamp).toLocaleString("ja-JP")}</div>
                  </div>
                  <div style={{display:"flex",flexDirection:"column",alignItems:"flex-end",gap:4}}>
                    {s.result?.gait_metrics&&(
                      <div style={{fontSize:11,color:"#185FA5",fontWeight:500}}>
                        {s.result.gait_metrics.speed_post}m/s / {s.result.gait_metrics.cadence_post}歩/分
                      </div>
                    )}
                    {s.result?.cog&&(
                      <div style={{fontSize:11,color:scoreColor(s.result.cog.score_post),fontWeight:500}}>
                        重心 {s.result.cog.score_post}/100
                      </div>
                    )}
                    <button onClick={e=>handleDelete(s.id,e)} disabled={deleting===s.id}
                      style={{fontSize:10,color:"#E24B4A",background:"none",border:"0.5px solid #E24B4A",borderRadius:4,padding:"2px 6px",cursor:"pointer"}}>
                      {deleting===s.id?"削除中…":"削除"}
                    </button>
                  </div>
                </div>

                {/* 展開詳細 */}
                {selected?.id===s.id&&s.result&&(
                  <div style={{marginTop:12,borderTop:"0.5px solid #ddd",paddingTop:12}}>
                    {/* フレームサムネイル */}
                    {(s.frames_pre?.length>0||s.frames_post?.length>0)&&(
                      <div style={{display:"flex",gap:8,marginBottom:12}}>
                        {["pre","post"].map(w=>(
                          <div key={w} style={{flex:1}}>
                            <div style={{fontSize:11,color:"#aaa",marginBottom:4}}>{w==="pre"?"訓練前":"訓練後"}</div>
                            <div style={{display:"flex",gap:3}}>
                              {(w==="pre"?s.frames_pre:s.frames_post).map((f,i)=>(
                                <img key={i} src={f} style={{width:48,height:32,objectFit:"cover",borderRadius:3,border:"0.5px solid #ddd"}} alt=""/>
                              ))}
                            </div>
                          </div>
                        ))}
                      </div>
                    )}
                    {/* 速度・ケーデンス */}
                    {s.result.gait_metrics&&(
                      <div style={{display:"grid",gridTemplateColumns:"repeat(2,1fr)",gap:6,marginBottom:10}}>
                        {[["歩行速度",s.result.gait_metrics.speed_pre,s.result.gait_metrics.speed_post,"m/s"],
                          ["ケーデンス",s.result.gait_metrics.cadence_pre,s.result.gait_metrics.cadence_post,"歩/分"]].map(([name,pre,post,unit])=>(
                          <div key={name} style={{background:"#f8f9fb",borderRadius:6,padding:"8px 10px"}}>
                            <div style={{fontSize:10,color:"#aaa"}}>{name}</div>
                            <div style={{fontSize:13,fontWeight:500}}>{pre}→{post} <span style={{fontSize:10,color:"#aaa"}}>{unit}</span></div>
                          </div>
                        ))}
                      </div>
                    )}
                    {/* 関節角度 */}
                    <div style={{display:"grid",gridTemplateColumns:"repeat(3,1fr)",gap:6,marginBottom:10}}>
                      {[["股",s.result.angles.hip_pre,s.result.angles.hip_post],
                        ["膝",s.result.angles.knee_pre,s.result.angles.knee_post],
                        ["足",s.result.angles.ankle_pre,s.result.angles.ankle_post]].map(([n,pre,post])=>(
                        <div key={n} style={{background:"#f8f9fb",borderRadius:6,padding:"8px 10px",textAlign:"center"}}>
                          <div style={{fontSize:10,color:"#aaa"}}>{n}関節</div>
                          <div style={{fontSize:12,fontWeight:500}}>{pre}°→{post}°</div>
                          <div style={{fontSize:10,color:post-pre>0?"#1D9E75":"#E24B4A"}}>{post-pre>0?"+":""}{post-pre}°</div>
                        </div>
                      ))}
                    </div>
                    {/* 即時効果 */}
                    {s.result.immediate_effect&&(
                      <div style={{fontSize:12,color:"#555",lineHeight:1.6,background:"#f8f9fb",borderRadius:6,padding:"8px 10px"}}>
                        {s.result.immediate_effect.summary}
                      </div>
                    )}
                  </div>
                )}
              </div>
            ))}
          </div>
        )}
      </Card>
      <NavRow>
        <Btn onClick={onBack}>← レポートへ戻る</Btn>
      </NavRow>
    </div>
  );
}

// ── メインアプリ ──────────────────────────────────────
function App(){
  const [step,setStep]=useState(0);
  const [patient,setPatient]=useState({date:new Date().toISOString().slice(0,10)});
  const angleRef=useRef();
  const preFramesRef=useRef([]);
  const postFramesRef=useRef([]);
  const resultRef=useRef(null);

  return(
    <div style={{maxWidth:680,margin:"0 auto",padding:"1.5rem 1rem"}}>
      <div style={{marginBottom:"1.5rem"}}>
        <h1 style={{fontSize:20,fontWeight:500,marginBottom:4}}>歩行解析 AI v2</h1>
        <p style={{fontSize:13,color:"#888"}}>Urasoe General Hospital — Gait Analysis System</p>
      </div>
      <StepNav current={step}/>
      {step===0&&<Step1Patient onNext={()=>setStep(1)} data={patient} setData={setPatient}/>}
      {step===1&&<Step2Camera onBack={()=>setStep(0)} onNext={()=>setStep(2)}/>}
      {step===2&&<Step3Video onBack={()=>setStep(1)} onNext={()=>setStep(3)} angleRef={angleRef} preFramesRef={preFramesRef} postFramesRef={postFramesRef}/>}
      {step===3&&<Step4Analysis onBack={()=>setStep(2)} onNext={()=>setStep(4)} patient={patient} angleRef={angleRef} preFramesRef={preFramesRef} postFramesRef={postFramesRef} resultRef={resultRef}/>}
      {step===4&&<Step5Report onBack={()=>setStep(3)} onHistory={()=>setStep(5)} patient={patient} resultRef={resultRef}/>}
      {step===5&&<Step6History onBack={()=>setStep(4)}/>}
    </div>
  );
}
ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>
</body>
</html>
